<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Love Teeline Together – Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #f9f5ee;
    --border: #ddd4c0;
    --accent: #5c3d1e;
    --accent-light: #8b6f47;
    --accent-dim: #c4a882;
    --text: #1a1208;
    --text-dim: #8b7355;
    --correct: #2d5a27;
    --correct-bg: #edf5eb;
    --correct-light: #3a7a32;
    --wrong: #7c3a3a;
    --wrong-bg: #fdf0f0;
    --wrong-light: #a04040;
    --shadow: rgba(26,18,8,0.08);
  }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 27px,
      rgba(139,111,71,0.06) 27px, rgba(139,111,71,0.06) 28px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--text-dim);
    font-style: italic;
  }

  /* Mode selector */
  .mode-bar {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .mode-btn {
    flex: 1;
    padding: 0.6rem 1rem;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: none;
    background: var(--surface);
    color: var(--text-dim);
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
  }

  .mode-btn:hover:not(.active) {
    background: var(--surface2);
    color: var(--text);
  }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    padding: 0.6rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.88rem;
    color: var(--text-dim);
  }

  .score-stat {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .score-stat strong {
    font-size: 1.1rem;
    font-weight: 600;
  }

  .score-correct strong { color: var(--correct-light); }
  .score-wrong strong { color: var(--wrong-light); }
  .score-total strong { color: var(--accent); }

  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 0.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--correct), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Card */
  .card-wrap {
    perspective: 1000px;
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2.5rem 2rem;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .card-label {
    position: absolute;
    top: 1rem;
    left: 1.2rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent-dim);
  }

  .card-counter {
    position: absolute;
    top: 1rem;
    right: 1.2rem;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  /* Teeline image display */
  .teeline-img {
    max-width: 220px;
    max-height: 160px;
    object-fit: contain;
  }

  .img-error {
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.9rem;
  }

  /* English word display */
  .english-word {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: var(--accent);
    letter-spacing: 0.03em;
    text-align: center;
  }

  /* Input area */
  .answer-area {
    width: 100%;
    margin-bottom: 1rem;
  }

  .answer-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.2rem;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 0.75rem;
  }

  .answer-input:focus {
    border-color: var(--accent-light);
  }

  .answer-input.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct-light);
  }

  .answer-input.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong-light);
  }

  .answer-hint {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 0.75rem;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 0.75rem;
    width: 100%;
  }

  .btn {
    flex: 1;
    padding: 0.65rem 1rem;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1rem;
    letter-spacing: 0.04em;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface);
    color: var(--text-dim);
  }

  .btn-reveal {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-size: 1.05rem;
  }

  .btn-reveal:hover {
    background: var(--accent-light);
    border-color: var(--accent-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--shadow);
  }

  .btn-correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct-light);
  }

  .btn-correct:hover {
    background: #d8edda;
    transform: translateY(-1px);
  }

  .btn-wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: var(--wrong-light);
  }

  .btn-wrong:hover {
    background: #fce0e0;
    transform: translateY(-1px);
  }

  .btn-next {
    background: var(--surface2);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .btn-next:hover {
    background: var(--accent-dim);
    color: white;
    transform: translateY(-1px);
  }

  /* Revealed answer */
  .revealed-answer {
    text-align: center;
    padding: 0.75rem;
    border-radius: 4px;
    margin-bottom: 0.75rem;
    font-size: 1.1rem;
    display: none;
  }

  .revealed-answer.show {
    display: block;
  }

  .revealed-answer.correct-reveal {
    background: var(--correct-bg);
    border: 1px solid var(--correct);
    color: var(--correct-light);
  }

  .revealed-answer.neutral-reveal {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* Deck complete */
  .deck-complete {
    text-align: center;
    padding: 3rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 20px var(--shadow);
    display: none;
  }

  .deck-complete.show { display: block; }

  .final-score {
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 4rem;
    color: var(--accent);
    line-height: 1;
    margin: 1rem 0;
  }

  .final-label {
    font-size: 1rem;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 2rem;
  }

  .btn-restart {
    padding: 0.75rem 2.5rem;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.1rem;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: white;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .btn-restart:hover {
    background: var(--accent-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--shadow);
  }

  .ornament {
    color: var(--accent-dim);
    font-size: 1.2rem;
    letter-spacing: 0.5em;
    margin: 1rem 0;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Let's Love Teeline Together</h1>
    <p class="subtitle">Flashcards — test your knowledge both ways</p>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" id="mode-read" onclick="setMode('read')">
      Teeline → English
    </button>
    <button class="mode-btn" id="mode-write" onclick="setMode('write')">
      English → Teeline
    </button>
  </div>

  <div class="score-bar">
    <div class="score-stat score-correct">✓ <strong id="score-correct">0</strong> correct</div>
    <div class="score-stat score-wrong">✗ <strong id="score-wrong">0</strong> wrong</div>
    <div class="score-stat score-total">
      <strong id="score-seen">0</strong>/<strong id="score-total">0</strong> cards
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <div style="height:1.5rem"></div>

  <!-- Main card -->
  <div class="card-wrap" id="card-wrap">
    <div class="card" id="main-card">
      <span class="card-label" id="card-label">Teeline Outline</span>
      <span class="card-counter" id="card-counter">1 / 6</span>
      <div id="card-content"></div>
    </div>
  </div>

  <!-- Answer area -->
  <div class="answer-area" id="answer-area">
    <p class="answer-hint" id="answer-hint">Type the English word, or click Reveal</p>
    <input
      type="text"
      class="answer-input"
      id="answer-input"
      placeholder="Your answer…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <div class="revealed-answer" id="revealed-answer"></div>
    <div class="btn-row" id="btn-row-reveal">
      <button class="btn btn-reveal" onclick="reveal()">Reveal Answer</button>
    </div>
    <div class="btn-row" id="btn-row-mark" style="display:none">
      <button class="btn btn-correct" onclick="mark(true)">✓ Got it</button>
      <button class="btn btn-wrong" onclick="mark(false)">✗ Missed it</button>
    </div>
  </div>

  <!-- Deck complete -->
  <div class="deck-complete" id="deck-complete">
    <div class="ornament">✦ ✦ ✦</div>
    <p style="color:var(--text-dim);font-style:italic;font-size:1rem;">Round complete</p>
    <div class="final-score" id="final-score">0/6</div>
    <p class="final-label" id="final-label">Keep practising!</p>
    <div class="ornament">✦ ✦ ✦</div>
    <button class="btn-restart" onclick="restart()">Shuffle &amp; Restart</button>
  </div>
</div>

<script>
// ── Database ──────────────────────────────────────────────────────────────────
// Add new words here as your Drive database grows.
// Format: { word: 'english', id: 'GOOGLE_DRIVE_FILE_ID' }

const CARDS = [
  { word: 'players',   id: '1BhQah_QjXbiDckp4k8g5GXHDePcRjaKL' },
  { word: 'top',       id: '1rmjIPa5enJWkquIo5ox0aZ5fJ3tbUrPH' },
  { word: 'childhood', id: '1LrT_V9e0wmouZgPNMxiMz1fzRYZCENSo' },
  { word: 'father',    id: '1iOFDdG_dw6NOqzhq4gPu9gbFP4hlL0Un' },
  { word: 'admit',     id: '1abFnoZtzl5Pb2CXcYvil4LkxoWSFN2U8' },
  { word: 'the',       id: '1omL9NBkZO3bbE00v9WTaKGCwzPBO3hpK'  },
];

function imgUrl(id) {
  return `https://lh3.googleusercontent.com/d/${id}`;
}

// ── State ─────────────────────────────────────────────────────────────────────
let mode = 'read'; // 'read' = show Teeline, guess English | 'write' = show English, recall Teeline
let deck = [];
let current = 0;
let correct = 0;
let wrong = 0;
let revealed = false;

// ── Shuffle ───────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('mode-read').classList.toggle('active', m === 'read');
  document.getElementById('mode-write').classList.toggle('active', m === 'write');
  restart();
}

// ── Render card ───────────────────────────────────────────────────────────────
function renderCard() {
  const card = deck[current];
  const content = document.getElementById('card-content');
  const label = document.getElementById('card-label');
  const counter = document.getElementById('card-counter');
  const input = document.getElementById('answer-input');
  const hint = document.getElementById('answer-hint');
  const revealedEl = document.getElementById('revealed-answer');
  const btnReveal = document.getElementById('btn-row-reveal');
  const btnMark = document.getElementById('btn-row-mark');

  counter.textContent = `${current + 1} / ${deck.length}`;
  revealed = false;
  input.value = '';
  input.className = 'answer-input';
  revealedEl.className = 'revealed-answer';
  revealedEl.textContent = '';
  btnReveal.style.display = 'flex';
  btnMark.style.display = 'none';

  if (mode === 'read') {
    // Show Teeline image, student guesses English word
    label.textContent = 'Teeline Outline';
    hint.textContent = 'Type the English word, or click Reveal';
    input.placeholder = 'Your answer…';
    input.style.display = 'block';
    content.innerHTML = `<img class="teeline-img" src="${imgUrl(card.id)}" alt="Teeline outline"
      onerror="this.outerHTML='<p class=\\'img-error\\'>Image not available</p>'">`;
  } else {
    // Show English word, student recalls Teeline outline
    label.textContent = 'English Word';
    hint.textContent = 'Picture the Teeline outline, then click Reveal to check';
    input.style.display = 'none';
    content.innerHTML = `<span class="english-word">${card.word}</span>`;
  }
}

// ── Reveal ────────────────────────────────────────────────────────────────────
function reveal() {
  if (revealed) return;
  revealed = true;

  const card = deck[current];
  const input = document.getElementById('answer-input');
  const revealedEl = document.getElementById('revealed-answer');
  const btnReveal = document.getElementById('btn-row-reveal');
  const btnMark = document.getElementById('btn-row-mark');

  if (mode === 'read') {
    const typed = input.value.trim().toLowerCase();
    const correct_answer = card.word.toLowerCase();

    if (typed && typed === correct_answer) {
      input.className = 'answer-input correct';
      revealedEl.className = 'revealed-answer correct-reveal show';
      revealedEl.textContent = '✓ Correct!';
      // Auto-mark as correct
      setTimeout(() => mark(true), 800);
      return;
    } else if (typed && typed !== correct_answer) {
      input.className = 'answer-input wrong';
      revealedEl.className = 'revealed-answer show';
      revealedEl.style.background = 'rgba(124,58,58,0.15)';
      revealedEl.style.border = '1px solid var(--wrong)';
      revealedEl.style.color = 'var(--wrong-light)';
      revealedEl.textContent = `Answer: ${card.word}`;
    } else {
      revealedEl.className = 'revealed-answer neutral-reveal show';
      revealedEl.textContent = `Answer: ${card.word}`;
    }
  } else {
    // Write mode — show the Teeline image
    revealedEl.className = 'revealed-answer neutral-reveal show';
    revealedEl.style.background = 'transparent';
    revealedEl.style.border = 'none';
    revealedEl.innerHTML = `<img class="teeline-img" src="${imgUrl(card.id)}" alt="Teeline outline for ${card.word}"
      onerror="this.outerHTML='<p class=\\'img-error\\'>Image not available</p>'">`;
  }

  btnReveal.style.display = 'none';
  btnMark.style.display = 'flex';
}

// ── Mark ──────────────────────────────────────────────────────────────────────
function mark(isCorrect) {
  if (isCorrect) correct++;
  else wrong++;

  updateScore();

  current++;
  if (current >= deck.length) {
    showComplete();
  } else {
    renderCard();
  }
}

// ── Score ─────────────────────────────────────────────────────────────────────
function updateScore() {
  const seen = correct + wrong;
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent = wrong;
  document.getElementById('score-seen').textContent = seen;
  document.getElementById('score-total').textContent = deck.length;
  document.getElementById('progress-fill').style.width =
    deck.length ? `${(seen / deck.length) * 100}%` : '0%';
}

// ── Complete ──────────────────────────────────────────────────────────────────
function showComplete() {
  document.getElementById('card-wrap').style.display = 'none';
  document.getElementById('answer-area').style.display = 'none';
  const complete = document.getElementById('deck-complete');
  complete.classList.add('show');

  const pct = Math.round((correct / deck.length) * 100);
  document.getElementById('final-score').textContent = `${correct}/${deck.length}`;

  let label = '';
  if (pct === 100) label = 'Perfect score — outstanding!';
  else if (pct >= 80) label = 'Excellent work — nearly there!';
  else if (pct >= 60) label = 'Good effort — keep practising!';
  else label = 'Keep at it — it will come!';
  document.getElementById('final-label').textContent = label;
}

// ── Restart ───────────────────────────────────────────────────────────────────
function restart() {
  deck = shuffle(CARDS);
  current = 0;
  correct = 0;
  wrong = 0;

  document.getElementById('card-wrap').style.display = 'block';
  document.getElementById('answer-area').style.display = 'block';
  document.getElementById('deck-complete').classList.remove('show');

  updateScore();
  renderCard();
}

// ── Enter key submits ─────────────────────────────────────────────────────────
document.getElementById('answer-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') reveal();
});

// ── Init ──────────────────────────────────────────────────────────────────────
restart();
</script>
</body>
</html>
